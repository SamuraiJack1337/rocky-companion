# electron-builder configuration.
# Build an unsigned macOS .dmg with:  npm run dist:mac
# Build an unsigned Windows .exe with: npm run dist:win
# Releases are produced by .github/workflows/release.yml on version tags.
#
# Nothing here bakes in any secret. Users supply their own key at runtime.
appId: com.rockycompanion.app
productName: Rocky Companion
copyright: Copyright © 2026 Rocky Companion contributors

directories:
  output: release
  buildResources: build

# Ad-hoc sign the packed .app (see the hook for why TCC needs this).
afterPack: ./scripts/adhoc-sign.cjs

files:
  - dist/**/*
  - package.json

# Ship the official Rocky skin inside the app. On first run main/assets.ts
# seeds it into userData/skins so a fresh install shows the official creature
# rather than the procedural fallback. Landing at <resources>/skins/rocky-hq/.
extraResources:
  - from: samples/skins
    to: skins
    filter:
      - rocky-hq/**

# Rocky is a menu-bar / floating companion, not a normal windowed app.
mac:
  category: public.app-category.utilities
  icon: build/icon.icns
  # No Developer ID yet: identity null stops electron-builder from looking for
  # a certificate; the afterPack hook above applies an ad-hoc signature instead
  # so macOS TCC can attach Screen Recording grants to the bundle. Users still
  # bypass Gatekeeper once per install (xattr / right-click → Open).
  identity: null
  # One DMG that runs on both Apple Silicon and Intel Macs.
  target:
    - target: dmg
      arch: universal
  # Bundle the offline neural voice (sherpa-onnx) engine + Rocky's voice model.
  # Fetched into vendor/ before the build by scripts/fetch-piper.mjs. The binary
  # + its onnxruntime dylib are universal2 (arm64 + x86_64), so one copy serves
  # both DMG slices. Lands at <resources>/piper/ (engine) and
  # <resources>/piper/voice/ (model, tokens, espeak-ng-data); src/main/
  # piperTts.ts resolves them there, mirroring the Windows layout. The
  # afterPack adhoc-sign hook signs the nested binary + dylib (see that file).
  extraResources:
    - from: vendor/piper/mac
      to: piper
    - from: vendor/voices-mac
      to: piper/voice
  # Screen Recording permission prompt copy (Info.plist).
  extendInfo:
    NSScreenCaptureUsageDescription: >-
      Rocky periodically takes a screenshot so he can understand, at a high
      level, what you are doing and react in character. Images are never saved
      to disk. You can pause Rocky at any time.
    # Hide from the Dock — Rocky lives in the menu bar and floats on screen.
    LSUIElement: true

dmg:
  title: Rocky Companion
  artifactName: RockyCompanion-${version}-mac.dmg

# Windows. Like the mac build this ships UNSIGNED for now — SmartScreen will
# warn once ("More info → Run anyway") until an Authenticode certificate is in
# place. The adhoc-sign afterPack hook is a no-op off macOS, so it is harmless
# here. No permission plist entries are needed: Windows has no TCC-style gate
# for screen capture, and the mic prompt comes from getUserMedia at runtime.
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: x64
  # Bundle the offline neural voice (Piper) engine + Rocky's voice model.
  # Fetched into vendor/ before the build by scripts/fetch-piper.mjs. Lands at
  # <resources>/piper/ (engine + espeak data) and <resources>/piper/voice/
  # (the .onnx model); src/main/piperTts.ts resolves them there.
  extraResources:
    - from: vendor/piper/win
      to: piper
    - from: vendor/voices
      to: piper/voice

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: RockyCompanion-${version}-win.exe

# The CI workflow uploads artifacts itself; never auto-publish from a laptop.
publish: null
